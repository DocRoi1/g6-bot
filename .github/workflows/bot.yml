name: Gruppe 6 Bot

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install

      - name: Check secrets exist
        run: |
          if [ -z "$BOT_TOKEN" ]; then
            echo "BOT_TOKEN: VIDE"
          else
            echo "BOT_TOKEN: OK (${#BOT_TOKEN} chars)"
          fi
          if [ -z "$WEBAPP_URL" ]; then
            echo "WEBAPP_URL: VIDE"
          else
            echo "WEBAPP_URL: OK"
          fi
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          WEBAPP_URL: ${{ secrets.WEBAPP_URL }}

      - name: Run bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          WEBAPP_URL: ${{ secrets.WEBAPP_URL }}
          CHANNEL_ID: "1498184266045984881"
        run: node bot.js
