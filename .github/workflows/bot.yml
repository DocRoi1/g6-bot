name: Gruppe 6 Bot

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install
        run: npm install

      - name: Run
        run: node bot.js
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          WEBAPP_URL: ${{ secrets.WEBAPP_URL }}
          CHANNEL_ID: "1498184266045984881"
